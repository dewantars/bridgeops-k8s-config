apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: laravel-devops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dewantars/bridgeops-k8s-config.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: myapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
