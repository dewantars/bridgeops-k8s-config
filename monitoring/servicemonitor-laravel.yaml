apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: laravel-servicemonitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - myapp
  selector:
    matchLabels:
      app: laravel-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
